<!DOCTYPE html>
<html lang="en" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive web application to track, filter, and share Google Cloud BigQuery release notes. Select updates and tweet them instantly.">
    <title>BigQuery Release Notes Tracker & Social Hub</title>
    <!-- Google Fonts: Inter for UI, Fira Code for Monospace -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- App Container -->
    <div class="app-layout">
        <!-- Top Navigation Bar -->
        <header class="app-header">
            <div class="header-container">
                <div class="header-logo-group">
                    <div class="logo-icon-wrapper">
                        <!-- Database Sparkle SVG Icon -->
                        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 4.24 2 7V17C2 19.76 6.48 22 12 22C17.52 22 22 19.76 22 17V7C22 4.24 17.52 2 12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 7C2 9.76 6.48 12 12 12C17.52 12 22 9.76 22 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12C2 14.76 6.48 17 12 17C17.52 17 22 14.76 22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M19 3L18 5L16 6L18 7L19 9L20 7L22 6L20 5L19 3Z" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="logo-text-wrapper">
                        <span class="logo-tag">GOOGLE CLOUD</span>
                        <h1 class="logo-title">BigQuery Release Tracker</h1>
                    </div>
                </div>

                <div class="header-actions">
                    <!-- Synced indicator -->
                    <div class="sync-status" id="sync-status">
                        <span class="status-indicator-dot success"></span>
                        <span class="status-text" id="status-text">Checking feed...</span>
                    </div>

                    <!-- Refresh Button -->
                    <button class="btn btn-secondary btn-icon" id="btn-refresh" title="Refresh Release Notes">
                        <svg class="icon" id="refresh-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21.5 2V6H17.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M21.34 11.5C21 16 17.5 19.5 13 19.8C8.5 20.1 4.5 17 3.4 12.8C2.3 8.6 4.7 4.1 9 2.7C12.3 1.6 16 2.5 18.5 4.9L21.5 7.9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="btn-text">Refresh</span>
                    </button>

                    <!-- Theme Toggle Button -->
                    <button class="btn btn-tertiary btn-icon btn-circle" id="btn-theme-toggle" title="Toggle Theme">
                        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
                            <path d="M12 1V3M12 21V23M4.22 4.22L5.64 5.64M18.36 18.36L19.78 19.78M1 12H3M21 12H23M4.22 19.78L5.64 18.36M18.36 5.64L19.78 4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="app-main">
            <div class="main-container">
                
                <!-- Left Section: Search, Filter & Notes List -->
                <section class="feed-section">
                    
                    <!-- Search & Filter Hub -->
                    <div class="filter-hub card">
                        <div class="search-box">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                                <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                            <input type="text" id="search-input" placeholder="Search updates (e.g. Gemini, Standard SQL, quotas)..." aria-label="Search updates">
                            <button id="clear-search" class="clear-btn" title="Clear search" style="display: none;">&times;</button>
                        </div>
                        
                        <div class="filter-tags-scroll">
                            <div class="filter-tags" id="filter-tags-container">
                                <button class="tag active" data-type="all">
                                    All <span class="tag-count" id="count-all">0</span>
                                </button>
                                <button class="tag" data-type="Feature">
                                    Features <span class="tag-count" id="count-feature">0</span>
                                </button>
                                <button class="tag" data-type="Issue">
                                    Issues <span class="tag-count" id="count-issue">0</span>
                                </button>
                                <button class="tag" data-type="Changed">
                                    Changes <span class="tag-count" id="count-changed">0</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Feed Status (Error, Empty, or Info) -->
                    <div id="feed-status" class="feed-status-banner" style="display: none;"></div>

                    <!-- Release Notes Feed -->
                    <div class="release-feed" id="release-feed">
                        <!-- Skeleton Loader (Shown during fetching) -->
                        <div class="skeleton-container" id="skeleton-loader">
                            <div class="skeleton-group">
                                <div class="skeleton-date-bar"></div>
                                <div class="skeleton-card"></div>
                                <div class="skeleton-card"></div>
                            </div>
                            <div class="skeleton-group">
                                <div class="skeleton-date-bar"></div>
                                <div class="skeleton-card"></div>
                            </div>
                        </div>
                        
                        <!-- Dynamic content will be injected here -->
                    </div>
                </section>

                <!-- Right Section (Desktop Sidebar) / Overlay Drawer (Mobile) -->
                <aside class="composer-sidebar" id="composer-sidebar">
                    <div class="composer-container card sticky-panel">
                        <!-- Composer Header -->
                        <div class="composer-header">
                            <div class="composer-header-title">
                                <svg class="icon accent-color" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <h2>Tweet Composer</h2>
                            </div>
                            <button class="btn-close-drawer" id="btn-close-drawer" aria-label="Close Composer">
                                &times;
                            </button>
                        </div>

                        <!-- Empty State (No Update Selected) -->
                        <div class="composer-empty-state" id="composer-empty-state">
                            <div class="empty-icon-wrapper">
                                <svg class="empty-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <p class="empty-title">No Update Selected</p>
                            <p class="empty-description">Click on any release note card on the left to load it into the Composer and write a tweet about it.</p>
                        </div>

                        <!-- Active State (Update Selected) -->
                        <div class="composer-active-state" id="composer-active-state" style="display: none;">
                            <div class="selected-details">
                                <div class="details-row">
                                    <span class="badge" id="composer-badge">Feature</span>
                                    <span class="date" id="composer-date">June 15, 2026</span>
                                </div>
                                <div class="original-snippet-box">
                                    <p class="snippet-title">Original Update:</p>
                                    <p class="snippet-text" id="composer-snippet-text"></p>
                                </div>
                            </div>

                            <!-- Editor Area -->
                            <div class="editor-area">
                                <label for="tweet-textarea" class="editor-label">Customize Tweet Content:</label>
                                <div class="textarea-wrapper">
                                    <textarea id="tweet-textarea" placeholder="Draft your tweet here..." rows="6" maxlength="500"></textarea>
                                </div>
                                <div class="editor-footer">
                                    <div class="char-counter" id="char-counter">
                                        <span id="char-count">0</span> / <span id="char-max">280</span>
                                    </div>
                                    <button class="btn-text-only" id="btn-reset-tweet" title="Reset to default format">
                                        Reset Draft
                                    </button>
                                </div>
                            </div>

                            <!-- Action Buttons -->
                            <div class="composer-actions">
                                <button class="btn btn-primary" id="btn-tweet" title="Open Twitter/X with this tweet">
                                    <!-- Twitter/X logo SVG -->
                                    <svg class="icon fill-white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                                    </svg>
                                    <span>Share on X</span>
                                </button>
                                
                                <button class="btn btn-secondary" id="btn-copy-tweet" title="Copy tweet text to clipboard">
                                    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <rect x="8" y="2" width="8" height="4" rx="1" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                                    </svg>
                                    <span>Copy Text</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </main>

        <!-- Floating Mobile Selection Bar -->
        <div class="mobile-action-bar" id="mobile-action-bar" style="display: none;">
            <div class="mobile-bar-info">
                <span class="mobile-bar-badge" id="mobile-bar-badge">Feature</span>
                <span class="mobile-bar-text" id="mobile-bar-text">Selected update ready</span>
            </div>
            <button class="btn btn-primary btn-sm" id="btn-open-mobile-composer">
                Customize & Tweet
            </button>
        </div>
    </div>

    <!-- Main JavaScript Logic -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
