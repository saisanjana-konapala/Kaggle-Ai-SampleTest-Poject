<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure login portal for Students and Faculty members of the Result Management System.">
    <title>Login - Student Result Management System</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header section -->
            <div class="login-header">
                <div class="login-logo">
                    <!-- Academic Graduation cap SVG -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/>
                    </svg>
                </div>
                <h1 class="login-title">Academic Portal</h1>
                <p class="login-subtitle">Sign in to manage student results and scores</p>
            </div>

            <!-- Role Selector Tabs -->
            <div class="login-role-selector">
                <button type="button" class="role-tab active" id="tab-student" onclick="setRole('student')">
                    Student Login
                </button>
                <button type="button" class="role-tab" id="tab-faculty" onclick="setRole('faculty')">
                    Faculty Login
                </button>
            </div>

            <!-- Error Banner -->
            {% if error %}
            <div class="error-banner" id="error-banner">
                {{ error }}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form action="{{ url_for('login') }}" method="POST" id="login-form">
                <input type="hidden" name="role" id="role-input" value="student">
                
                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                    <!-- Email field -->
                    <div class="form-group">
                        <label for="email" id="label-email">Student Email Address</label>
                        <input type="email" name="email" id="email" class="input-field" placeholder="e.g. student1@school.edu" required>
                    </div>

                    <!-- Password field -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" class="input-field" placeholder="••••••••" required>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary" style="height: 3rem; margin-top: 0.5rem;">
                        Sign In
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script to manage login role switching -->
    <script>
        function setRole(role) {
            const tabStudent = document.getElementById('tab-student');
            const tabFaculty = document.getElementById('tab-faculty');
            const roleInput = document.getElementById('role-input');
            const labelEmail = document.getElementById('label-email');
            const emailInput = document.getElementById('email');
            
            // Remove active status
            tabStudent.classList.remove('active');
            tabFaculty.classList.remove('active');
            
            // Add active status to selected
            if (role === 'student') {
                tabStudent.classList.add('active');
                roleInput.value = 'student';
                labelEmail.textContent = 'Student Email Address';
                emailInput.placeholder = 'e.g. student1@school.edu';
            } else {
                tabFaculty.classList.add('active');
                roleInput.value = 'faculty';
                labelEmail.textContent = 'Faculty Email Address';
                emailInput.placeholder = 'e.g. faculty@school.edu';
            }
            
            // Hide previous errors on tab switch
            const errorBanner = document.getElementById('error-banner');
            if (errorBanner) {
                errorBanner.style.display = 'none';
            }
        }
    </script>
</body>
</html>
